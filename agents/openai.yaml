interface:
  display_name: "browser67"
  short_description: "Use browser67 for real Chrome/Edge automation and TMWD-backed JS reverse workflows"
  default_prompt: "Use browser67's tmwd_browser MCP for logged-in Chrome/Edge pages, current tabs, CDP bridge, downloads/uploads, clipboard write/paste wrappers, and managed tab lifecycle; use js-reverse for observe/capture/rebuild workflows."

dependencies:
  tools:
    - type: "mcp"
      value: "tmwd_browser"
      description: "Primary real-browser MCP server for TMWD-backed Chrome/Edge automation and wrappers."
    - type: "mcp"
      value: "js-reverse"
      description: "TMWD-backed JS reverse MCP for signature tracing, hook sampling, and evidence export."

policy:
  allow_implicit_invocation: true
