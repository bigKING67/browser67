  short_description: "Use tmwd_browser for real Chrome/Edge profile automation"
  default_prompt: "Use tmwd_browser for logged-in Chrome/Edge pages, current tabs, CDP bridge, downloads/uploads, clipboard write/paste wrappers, and managed tab lifecycle."

dependencies:
  tools:
    - type: "mcp"
      value: "tmwd_browser"
